<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagos Proveedores</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0efe9;
  --surface: #ffffff;
  --border: #e0ddd6;
  --text: #1a1916;
  --text-muted: #6b6860;
  --text-faint: #9c9990;
  --green-bg: #eaf5ec; --green-text: #1a5c28; --green-border: #a8d5b0;
  --blue-bg: #e8f0fd;  --blue-text: #1a3a7a;  --blue-border: #a0b8f0;
  --red-bg: #fdeaea;   --red-text: #7a1a1a;   --red-border: #e8b4b4;
  --font: 'IBM Plex Sans', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
  --r: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
  --shadow-md: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.05);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

.header { background: linear-gradient(135deg, #1a1916 0%, #2d2b27 100%); color: #f5f4f0; padding: 0 2rem; height: 56px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
.header-title { font-family: var(--mono); font-size: 15px; font-weight: 500; letter-spacing: .04em; display: flex; align-items: center; gap: 8px; }
.header-title::before { content: ''; width: 8px; height: 8px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 6px #4ade80; }
.header-right { display: flex; align-items: center; gap: 14px; }
.header-version { font-size: 11px; color: #6b6860; font-family: var(--mono); background: rgba(255,255,255,.08); padding: 2px 8px; border-radius: 4px; }
.header-sync { font-size: 12px; color: #9c9990; font-family: var(--mono); }

.layout { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 56px); }
.sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 1.5rem 0; box-shadow: 2px 0 8px rgba(0,0,0,.04); }
.nav-section { padding: 0 1rem; margin-bottom: 1.5rem; }
.nav-label { font-size: 10px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--text-faint); padding: 0 .5rem; margin-bottom: .5rem; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: var(--r); cursor: pointer; font-size: 13px; color: var(--text-muted); transition: all .15s; }
.nav-item:hover { background: var(--bg); color: var(--text); }
.nav-item.active { background: var(--text); color: #f5f4f0; font-weight: 500; box-shadow: var(--shadow); }
.nav-icon { font-size: 15px; width: 20px; text-align: center; }

.main { padding: 2rem; overflow-y: auto; }
.page { display: none; }
.page.active { display: block; }
.page-title { font-size: 22px; font-weight: 600; margin-bottom: 1.5rem; }

.kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 1.5rem; }
.kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 16px 18px; box-shadow: var(--shadow); border-top: 3px solid var(--border); transition: transform .15s; }
.kpi:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.kpi-total    { border-top-color: #1a1916; }
.kpi-facturas { border-top-color: #1a3a7a; }
.kpi-pagos    { border-top-color: #1a5c28; }
.kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: .07em; color: var(--text-faint); margin-bottom: 8px; font-weight: 600; }
.kpi-value { font-family: var(--mono); font-size: 20px; font-weight: 500; }
.kpi-total .kpi-value { color: #1a1916; }
.kpi-facturas .kpi-value { color: #1a3a7a; }
.kpi-pagos .kpi-value { color: #1a5c28; }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 1rem; box-shadow: var(--shadow); }
.card-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: #fafaf8; border-radius: var(--r) var(--r) 0 0; flex-wrap: wrap; gap: 10px; }
.card-title { font-size: 13px; font-weight: 600; }
.card-body { padding: 18px; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
label { font-size: 12px; font-weight: 600; color: var(--text-muted); }
input, select, textarea {
  width: 100%; padding: 9px 12px; font-size: 13px; font-family: var(--font);
  border: 1.5px solid var(--border); border-radius: var(--r);
  background: #fafaf8; color: var(--text); transition: all .15s;
}
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--text); background: #fff; box-shadow: 0 0 0 3px rgba(26,25,22,.06); }
input#f-monto { font-family: var(--mono); letter-spacing: .02em; }
textarea { resize: vertical; min-height: 60px; }
.form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

.btn { padding: 8px 18px; font-size: 13px; font-family: var(--font); border-radius: var(--r); cursor: pointer; border: 1.5px solid var(--border); background: var(--surface); color: var(--text); font-weight: 500; transition: all .15s; }
.btn:hover { background: var(--bg); box-shadow: var(--shadow); }
.btn:active { transform: scale(.98); }
.btn-primary { background: var(--text); color: #f5f4f0; border-color: var(--text); }
.btn-primary:hover { opacity: .88; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-danger { color: var(--red-text); border-color: var(--red-border); }
.btn-danger:hover { background: var(--red-bg); }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text-faint); padding: 10px 14px; border-bottom: 2px solid var(--border); text-align: left; white-space: nowrap; background: #fafaf8; }
td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f7f6f2; }

.badge { display: inline-block; padding: 3px 9px; border-radius: 4px; font-size: 11px; font-weight: 600; font-family: var(--mono); text-transform: uppercase; letter-spacing: .04em; border: 1px solid transparent; }
.badge-pago    { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
.badge-factura { background: var(--blue-bg);  color: var(--blue-text);  border-color: var(--blue-border); }
.badge-gasto   { background: #fdf3e3; color: #7a4b00; border-color: #e8c97a; }

.prov-grid { display: grid; gap: 12px; }
.prov-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 16px 18px; box-shadow: var(--shadow); border-left: 4px solid var(--text); }
.prov-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.prov-card-name { font-family: var(--mono); font-size: 14px; font-weight: 500; }
.prov-card-total { font-family: var(--mono); font-size: 18px; font-weight: 500; color: #1a5c28; }
.prov-card-stats { font-size: 12px; color: var(--text-muted); display: flex; gap: 8px; flex-wrap: wrap; }
.prov-card-stats span { background: var(--bg); padding: 2px 8px; border-radius: 4px; }
.prov-detail { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 10px; display: none; }
.prov-detail.open { display: block; }
.pct-bar-bg { height: 5px; background: var(--border); border-radius: 3px; margin-top: 10px; }
.pct-bar { height: 5px; background: linear-gradient(90deg, #1a1916, #4a4744); border-radius: 3px; transition: width .4s; }

.filters { display: flex; gap: 8px; flex-wrap: wrap; }
.filter-btn { padding: 5px 14px; font-size: 12px; border: 1.5px solid var(--border); border-radius: 20px; background: var(--surface); color: var(--text-muted); cursor: pointer; font-weight: 500; transition: all .15s; }
.filter-btn:hover { border-color: var(--text); color: var(--text); }
.filter-btn.active { background: var(--text); color: #f5f4f0; border-color: var(--text); }

.toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--text); color: #f5f4f0; padding: 12px 20px; border-radius: var(--r); font-size: 13px; font-weight: 500; opacity: 0; transform: translateY(10px); transition: all .25s; pointer-events: none; z-index: 999; max-width: min(420px, calc(100vw - 2rem)); word-break: break-word; box-shadow: var(--shadow-md); }
.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { background: #7a1a1a; }
.toast.success { background: #1a5c28; }

.spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: -2px; margin-right: 5px; }
@keyframes spin { to { transform: rotate(360deg); } }

.loading { display: flex; align-items: center; justify-content: center; padding: 3rem; color: var(--text-muted); gap: 8px; }
.prov-item { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); }
.prov-item:last-child { border-bottom: none; }
.add-prov-row { display: flex; gap: 8px; margin-bottom: 12px; }
.empty { text-align: center; padding: 3rem; color: var(--text-faint); font-size: 13px; }
.amount { font-family: var(--mono); font-weight: 500; }

@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .kpi-row { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<script>
const APP_VERSION = "1.06";
const GAS_URL = "https://script.google.com/macros/s/AKfycbyWCWw_VPEDuPwrg_ZRYmPNdSbRin6CWN2AOBm7NojB-TZRzDm5ee4emUsU_hLrn4ye/exec";
const CACHE_KEY = "pagos_v1_cache";
</script>

<header class="header">
  <span class="header-title">pagos_proveedores</span>
  <div class="header-right">
    <span class="header-version" id="app-version"></span>
    <span class="header-sync" id="sync-status">—</span>
  </div>
</header>

<div class="layout">
  <nav class="sidebar">
    <div class="nav-section">
      <div class="nav-label">Menú</div>
      <div class="nav-item active" onclick="navTo('registrar', this)"><span class="nav-icon">＋</span> Registrar</div>
      <div class="nav-item" onclick="navTo('totales', this)"><span class="nav-icon">≡</span> Totales</div>
      <div class="nav-item" onclick="navTo('proveedores', this)"><span class="nav-icon">◈</span> Por proveedor</div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Config</div>
      <div class="nav-item" onclick="navTo('config', this)"><span class="nav-icon">⚙</span> Proveedores</div>
    </div>
  </nav>

  <main class="main">

    <div class="page active" id="page-registrar">
      <div class="page-title">Nuevo registro</div>
      <div class="card">
        <div class="card-header"><span class="card-title">Captura de factura o pago</span></div>
        <div class="card-body">
          <div class="form-grid">
            <div class="form-group">
              <label>Proveedor *</label>
              <select id="f-proveedor"><option value="">Cargando...</option></select>
            </div>
            <div class="form-group">
              <label>Tipo *</label>
              <select id="f-tipo">
                <option value="factura">Factura</option>
                <option value="pago">Pago</option>
              </select>
            </div>
            <div class="form-group">
              <label>Monto ($) * — usa coma miles y punto decimales</label>
              <input type="text" id="f-monto" inputmode="decimal" placeholder="0.00" autocomplete="off">
            </div>
            <div class="form-group">
              <label>Fecha *</label>
              <input type="date" id="f-fecha">
            </div>
            <div class="form-group">
              <label>Número de factura</label>
              <input type="text" id="f-factura" placeholder="Ej: FAC-001">
            </div>
            <div class="form-group">
              <label>Concepto / Referencia</label>
              <input type="text" id="f-concepto" placeholder="Descripción breve">
            </div>
          </div>
          <div class="form-actions">
            <button class="btn" onclick="clearForm()">Limpiar</button>
            <button class="btn btn-primary" id="btn-save" onclick="guardarRegistro()">Guardar registro</button>
          </div>
        </div>
      </div>
    </div>

    <div class="page" id="page-totales">
      <div class="page-title">Totales</div>
      <div class="kpi-row">
        <div class="kpi kpi-total"><div class="kpi-label">Total general</div><div class="kpi-value" id="k-total">—</div></div>
        <div class="kpi kpi-facturas"><div class="kpi-label">Facturas</div><div class="kpi-value" id="k-facturas">—</div></div>
        <div class="kpi kpi-pagos"><div class="kpi-label">Pagos</div><div class="kpi-value" id="k-pagos">—</div></div>
      </div>
      <div class="card">
        <div class="card-header">
          <span class="card-title">Todos los registros</span>
          <div class="filters">
            <button class="filter-btn active" onclick="setFilter('', this)">Todos</button>
            <button class="filter-btn" onclick="setFilter('factura', this)">Facturas</button>
            <button class="filter-btn" onclick="setFilter('pago', this)">Pagos</button>
          </div>
        </div>
        <div class="card-body" style="padding:0">
          <div id="tabla-total"><div class="loading"><span class="spinner"></span> Cargando...</div></div>
        </div>
      </div>
    </div>

    <div class="page" id="page-proveedores">
      <div class="page-title">Por proveedor</div>
      <div id="prov-cards"><div class="loading"><span class="spinner"></span> Cargando...</div></div>
    </div>

    <div class="page" id="page-config">
      <div class="page-title">Gestionar proveedores</div>
      <div class="card">
        <div class="card-header"><span class="card-title">Lista de proveedores</span></div>
        <div class="card-body">
          <div class="add-prov-row">
            <input type="text" id="new-prov" placeholder="Nombre del proveedor" style="flex:1">
            <button class="btn btn-primary" onclick="agregarProveedor()">Agregar</button>
          </div>
          <div id="prov-manager-list"><div class="loading"><span class="spinner"></span> Cargando...</div></div>
        </div>
      </div>
    </div>

  </main>
</div>

<div class="toast" id="toast"></div>

<script>
let state = { registros: [], proveedores: [], filter: "" };
let syncTimer = null;

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('app-version').textContent = 'v' + APP_VERSION;
  document.getElementById('f-fecha').value = new Date().toISOString().split('T')[0];

  const montoEl = document.getElementById('f-monto');
  montoEl.addEventListener('input', onMontoInput);
  montoEl.addEventListener('blur', onMontoBlur);

  const cached = localStorage.getItem(CACHE_KEY);
  if (cached) {
    try {
      const data = JSON.parse(cached);
      state.registros   = data.registros   || [];
      state.proveedores = data.proveedores || [];
      renderAll();
      setSyncStatus('Actualizando…', true);
    } catch {}
  }
  loadAll();
});

function saveCache() {
  localStorage.setItem(CACHE_KEY, JSON.stringify({
    registros: state.registros,
    proveedores: state.proveedores
  }));
}

function onMontoInput() {
  const el = document.getElementById('f-monto');
  el.value = sanitizeMontoTyping(el.value);
}

function onMontoBlur() {
  const el = document.getElementById('f-monto');
  const n = parseMonto(el.value);
  if (!isNaN(n) && el.value.trim() !== '') el.value = formatMontoDisplay(n);
}

function sanitizeMontoTyping(raw) {
  let s = String(raw || '').replace(/[^\d.,]/g, '');
  const dotIdx = s.indexOf('.');
  if (dotIdx !== -1) {
    s = s.slice(0, dotIdx + 1) + s.slice(dotIdx + 1).replace(/\./g, '');
    const parts = s.split('.');
    if (parts.length > 2) s = parts[0] + '.' + parts.slice(1).join('').replace(/\./g, '');
    const decSplit = s.split('.');
    if (decSplit[1] != null) decSplit[1] = decSplit[1].replace(/\D/g, '').slice(0, 2);
    s = decSplit.length > 1 ? decSplit[0] + '.' + (decSplit[1] || '') : decSplit[0];
  }
  let intPart = dotIdx === -1 ? s : s.split('.')[0];
  intPart = intPart.replace(/,/g, '');
  intPart = intPart.replace(/\D/g, '');
  intPart = intPart.replace(/^0+(?=\d)/, '');
  const withCommas = intPart === '' ? '' : intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  if (dotIdx === -1) return withCommas;
  const rest = s.includes('.') ? s.slice(s.indexOf('.') + 1).replace(/\D/g, '').slice(0, 2) : '';
  return withCommas + '.' + rest;
}

function parseMonto(str) {
  const s = String(str || '').replace(/,/g, '').trim();
  if (s === '' || s === '.') return NaN;
  const n = parseFloat(s);
  return n;
}

function formatMontoDisplay(n) {
  const fixed = (Math.round(n * 100) / 100).toFixed(2);
  const [ip, dp] = fixed.split('.');
  const withC = ip.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return withC + '.' + dp;
}

function scheduleQuietSync() {
  if (syncTimer) clearTimeout(syncTimer);
  syncTimer = setTimeout(() => { syncQuiet(); syncTimer = null; }, 400);
}

async function syncQuiet() {
  try {
    const data = await api('getAll');
    if (data.error) return;
    state.registros   = data.registros   || [];
    state.proveedores = data.proveedores || [];
    saveCache();
    renderAll();
    setSyncStatus('Sincronizado · ' + fmtTime(new Date()));
  } catch {}
}

async function parseJSON(res) {
  const text = await res.text();
  try { return JSON.parse(text); }
  catch { throw new Error('No JSON: ' + text.replace(/\s+/g,' ').trim().slice(0,150)); }
}

async function api(action) {
  const res = await fetch(GAS_URL + '?action=' + encodeURIComponent(action));
  return parseJSON(res);
}

async function apiPost(body) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(body)
  });
  return parseJSON(res);
}

async function loadAll() {
  setSyncStatus('Sincronizando…', true);
  try {
    const data = await api('getAll');
    if (data.error) throw new Error(data.error);
    state.registros   = data.registros   || [];
    state.proveedores = data.proveedores || [];
    saveCache();
    renderAll();
    setSyncStatus('Sincronizado · ' + fmtTime(new Date()));
  } catch (e) {
    if (!localStorage.getItem(CACHE_KEY)) {
      setSyncStatus('Sin conexión');
      toast('Error: ' + e.message, true);
    } else setSyncStatus('Caché · error red');
  }
}

function setSyncStatus(msg, loading = false) {
  const el = document.getElementById('sync-status');
  el.innerHTML = loading
    ? '<span class="spinner" style="border-color:#9c9990;border-right-color:transparent"></span>' + msg
    : msg;
}

function navTo(page, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  el.classList.add('active');
  if (page === 'totales') renderTotales();
  if (page === 'proveedores') renderProveedores();
  if (page === 'config') renderProvManager();
}

function renderAll() {
  renderProvSelect();
  renderTotales();
  renderProveedores();
  renderProvManager();
}

function renderProvSelect() {
  const s = document.getElementById('f-proveedor');
  s.innerHTML = '<option value="">Seleccionar proveedor…</option>' +
    state.proveedores.map(p => `<option value="${p}">${p}</option>`).join('');
}

function sumTipo(t) {
  return state.registros.reduce((a, r) => a + ((r.tipo === t) ? (parseFloat(r.monto) || 0) : 0), 0);
}

function badgeClass(t) {
  return (t === 'pago' || t === 'factura') ? 'badge-' + t : 'badge-gasto';
}

function renderTotales() {
  const regs = state.filter ? state.registros.filter(r => r.tipo === state.filter) : state.registros;
  const sumAll = state.registros.reduce((a, r) => a + (parseFloat(r.monto) || 0), 0);
  document.getElementById('k-total').textContent    = fmt(sumAll);
  document.getElementById('k-facturas').textContent = fmt(sumTipo('factura'));
  document.getElementById('k-pagos').textContent    = fmt(sumTipo('pago'));

  if (!regs.length) {
    document.getElementById('tabla-total').innerHTML = '<div class="empty">Sin registros</div>';
    return;
  }
  document.getElementById('tabla-total').innerHTML = `
    <div class="table-wrap"><table><thead><tr>
      <th>Fecha</th><th>Proveedor</th><th>Tipo</th><th>Monto</th><th>Factura</th><th>Concepto</th><th></th>
    </tr></thead><tbody>
    ${regs.map(r => `<tr>
      <td style="color:var(--text-muted);font-size:12px">${r.fecha}</td>
      <td style="font-family:var(--mono);font-size:12px;font-weight:500">${r.proveedor}</td>
      <td><span class="badge ${badgeClass(r.tipo)}">${r.tipo}</span></td>
      <td class="amount">${fmt(r.monto)}</td>
      <td style="color:var(--text-muted)">${r.factura || '—'}</td>
      <td style="color:var(--text-muted);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.concepto || '—'}</td>
      <td><button class="btn btn-sm btn-danger" onclick="eliminarRegistro('${r.id}')">✕</button></td>
    </tr>`).join('')}
    </tbody></table></div>`;
}

function setFilter(f, el) {
  state.filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTotales();
}

function renderProveedores() {
  const el = document.getElementById('prov-cards');
  if (!state.proveedores.length) { el.innerHTML = '<div class="empty">Sin proveedores registrados</div>'; return; }
  const totalGlobal = state.registros.reduce((a, r) => a + (parseFloat(r.monto) || 0), 0);
  el.innerHTML = '<div class="prov-grid">' + state.proveedores.map(p => {
    const regs  = state.registros.filter(r => r.proveedor === p);
    const total = regs.reduce((a, r) => a + (parseFloat(r.monto) || 0), 0);
    const pct   = totalGlobal ? ((total / totalGlobal) * 100).toFixed(1) : 0;
    const nf = regs.filter(r => r.tipo === 'factura').length;
    const np = regs.filter(r => r.tipo === 'pago').length;
    return `<div class="prov-card">
      <div class="prov-card-header">
        <div style="flex:1">
          <div class="prov-card-name">${p}</div>
          <div class="prov-card-stats" style="margin-top:6px">
            <span>${regs.length} mov.</span>
            <span>${nf} facturas</span>
            <span>${np} pagos</span>
          </div>
          <div class="pct-bar-bg"><div class="pct-bar" style="width:${pct}%"></div></div>
        </div>
        <div style="text-align:right;margin-left:16px">
          <div class="prov-card-total">${fmt(total)}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${pct}% del total</div>
          ${regs.length ? `<button class="btn btn-sm" style="margin-top:8px;font-size:11px" onclick="toggleDetail('${p}')">desglose</button>` : ''}
        </div>
      </div>
      ${regs.length ? `<div class="prov-detail" id="det-${p.replace(/\s/g,'_')}">
        <div class="table-wrap"><table><thead><tr>
          <th>Fecha</th><th>Tipo</th><th>Monto</th><th>Factura</th><th>Concepto</th>
        </tr></thead><tbody>
        ${regs.slice(0,20).map(r=>`<tr>
          <td style="color:var(--text-muted);font-size:12px">${r.fecha}</td>
          <td><span class="badge ${badgeClass(r.tipo)}">${r.tipo}</span></td>
          <td class="amount">${fmt(r.monto)}</td>
          <td style="color:var(--text-muted)">${r.factura||'—'}</td>
          <td style="color:var(--text-muted)">${r.concepto||'—'}</td>
        </tr>`).join('')}
        </tbody></table></div>
        ${regs.length > 20 ? `<p style="font-size:11px;color:var(--text-faint);padding:8px 0">Mostrando 20 de ${regs.length}</p>` : ''}
      </div>` : ''}
    </div>`;
  }).join('') + '</div>';
}

function toggleDetail(p) {
  const el = document.getElementById('det-' + p.replace(/\s/g,'_'));
  if (el) el.classList.toggle('open');
}

function renderProvManager() {
  const el = document.getElementById('prov-manager-list');
  if (!state.proveedores.length) { el.innerHTML = '<div class="empty">Sin proveedores</div>'; return; }
  el.innerHTML = state.proveedores.map(p => `
    <div class="prov-item">
      <span style="font-family:var(--mono);font-size:13px;font-weight:500">${p}</span>
      <button class="btn btn-sm btn-danger" onclick="eliminarProveedor('${p}')">✕ Eliminar</button>
    </div>`).join('');
}

async function guardarRegistro() {
  const prov     = document.getElementById('f-proveedor').value;
  const tipo     = document.getElementById('f-tipo').value;
  const montoStr = document.getElementById('f-monto').value;
  const fecha    = document.getElementById('f-fecha').value;
  const factura  = document.getElementById('f-factura').value.trim();
  const concepto = document.getElementById('f-concepto').value.trim();
  const montoNum = parseMonto(montoStr);

  if (!prov || !fecha || isNaN(montoNum)) {
    toast('Completa proveedor, fecha y monto válido', true);
    return;
  }

  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Guardando…';

  try {
    const res = await apiPost({
      action: 'addRegistro',
      data: { fecha, proveedor: prov, tipo, monto: montoNum, factura, concepto }
    });
    if (res.error) throw new Error(res.error);

    state.registros.push({
      id: res.id,
      fecha,
      proveedor: prov,
      tipo,
      monto: montoNum,
      factura,
      concepto
    });
    saveCache();
    renderAll();
    clearForm();
    toast('✓ Guardado', false, true);
    setSyncStatus('Actualizado · ' + fmtTime(new Date()));
    scheduleQuietSync();
  } catch (e) {
    toast('Error: ' + e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Guardar registro';
  }
}

async function eliminarRegistro(id) {
  if (!confirm('¿Eliminar este registro?')) return;
  const prev = state.registros.slice();
  state.registros = state.registros.filter(r => r.id !== id);
  saveCache();
  renderAll();
  try {
    const res = await apiPost({ action: 'deleteRegistro', id });
    if (res.error) throw new Error(res.error);
    toast('Eliminado');
    scheduleQuietSync();
  } catch (e) {
    state.registros = prev;
    saveCache();
    renderAll();
    toast('Error: ' + e.message, true);
  }
}

async function agregarProveedor() {
  const nombre = document.getElementById('new-prov').value.trim().toUpperCase();
  if (!nombre) return;
  const prevP = state.proveedores.slice();
  if (!state.proveedores.some(x => x.toUpperCase() === nombre)) {
    state.proveedores.push(nombre);
    state.proveedores.sort((a,b) => a.localeCompare(b, 'es'));
  }
  saveCache();
  renderAll();
  document.getElementById('new-prov').value = '';
  try {
    const res = await apiPost({ action: 'addProveedor', nombre });
    if (res.error) throw new Error(res.error);
    toast('✓ Proveedor agregado', false, true);
    scheduleQuietSync();
  } catch (e) {
    state.proveedores = prevP;
    saveCache();
    renderAll();
    toast('Error: ' + e.message, true);
  }
}

async function eliminarProveedor(nombre) {
  if (!confirm(`¿Eliminar proveedor "${nombre}"?`)) return;
  const prevR = state.registros.slice();
  const prevP = state.proveedores.slice();
  state.proveedores = state.proveedores.filter(p => p !== nombre);
  saveCache();
  renderAll();
  try {
    const res = await apiPost({ action: 'deleteProveedor', nombre });
    if (res.error) throw new Error(res.error);
    toast('Proveedor eliminado');
    scheduleQuietSync();
  } catch (e) {
    state.registros = prevR;
    state.proveedores = prevP;
    saveCache();
    renderAll();
    toast('Error: ' + e.message, true);
  }
}

function clearForm() {
  document.getElementById('f-proveedor').value = '';
  document.getElementById('f-tipo').value = 'factura';
  document.getElementById('f-monto').value = '';
  document.getElementById('f-factura').value = '';
  document.getElementById('f-concepto').value = '';
}

function fmt(n) {
  const num = parseFloat(n);
  if (isNaN(num)) return '—';
  return new Intl.NumberFormat('en-US', {
    style: 'currency',
    currency: 'USD',
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  }).format(num);
}

function fmtTime(d) {
  return d.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
}

function toast(msg, error = false, success = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (error ? ' error' : success ? ' success' : '');
  setTimeout(() => el.className = 'toast', 3500);
}
</script>
</body>
