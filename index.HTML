<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagos Proveedores</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --border: #e0ddd6;
  --border-strong: #c8c4bc;
  --text: #1a1916;
  --text-muted: #6b6860;
  --text-faint: #9c9990;
  --accent: #1a1916;
  --green-bg: #eaf5ec; --green-text: #1a5c28;
  --amber-bg: #fdf3e3; --amber-text: #7a4b00;
  --blue-bg: #e8f0fd; --blue-text: #1a3a7a;
  --red-bg: #fdeaea; --red-text: #7a1a1a;
  --font: 'IBM Plex Sans', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
  --r: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }
.header { background: var(--text); color: #f5f4f0; padding: 0 2rem; height: 52px; display: flex; align-items: center; justify-content: space-between; }
.header-title { font-family: var(--mono); font-size: 15px; font-weight: 500; letter-spacing: .02em; }
.header-right { display: flex; align-items: baseline; gap: 12px; }
.header-version { font-size: 11px; color: #9c9990; font-family: var(--mono); }
.header-sync { font-size: 12px; color: #9c9990; font-family: var(--mono); }
.layout { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 52px); }
.sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 1.5rem 0; }
.nav-section { padding: 0 1rem; margin-bottom: 1.5rem; }
.nav-label { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text-faint); padding: 0 .5rem; margin-bottom: .5rem; }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: var(--r); cursor: pointer; font-size: 13px; color: var(--text-muted); transition: all .15s; }
.nav-item:hover { background: var(--bg); color: var(--text); }
.nav-item.active { background: var(--text); color: #f5f4f0; font-weight: 500; }
.nav-icon { font-size: 15px; width: 18px; text-align: center; }
.main { padding: 2rem; overflow-y: auto; }
.page { display: none; }
.page.active { display: block; }
.page-title { font-size: 20px; font-weight: 600; margin-bottom: 1.5rem; }
.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
.kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 16px; }
.kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-faint); margin-bottom: 6px; }
.kpi-value { font-family: var(--mono); font-size: 18px; font-weight: 500; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 1rem; }
.card-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-title { font-size: 13px; font-weight: 600; }
.card-body { padding: 16px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: 1 / -1; }
label { font-size: 12px; font-weight: 500; color: var(--text-muted); }
input, select, textarea { width: 100%; padding: 8px 10px; font-size: 13px; font-family: var(--font); border: 1px solid var(--border); border-radius: var(--r); background: var(--bg); color: var(--text); transition: border .15s; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--text); }
textarea { resize: vertical; min-height: 60px; }
.form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
.btn { padding: 7px 16px; font-size: 13px; font-family: var(--font); border-radius: var(--r); cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text); transition: all .15s; font-weight: 500; }
.btn:hover { background: var(--bg); }
.btn:active { transform: scale(.98); }
.btn-primary { background: var(--text); color: #f5f4f0; border-color: var(--text); }
.btn-primary:hover { opacity: .85; background: var(--text); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-danger { color: var(--red-text); border-color: #e8b4b4; }
.btn-danger:hover { background: var(--red-bg); }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text-faint); padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: left; white-space: nowrap; }
td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg); }
.badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 600; font-family: var(--mono); text-transform: uppercase; letter-spacing: .04em; }
.badge-pago { background: var(--green-bg); color: var(--green-text); }
.badge-gasto { background: var(--amber-bg); color: var(--amber-text); }
.badge-factura { background: var(--blue-bg); color: var(--blue-text); }
.prov-grid { display: grid; gap: 10px; }
.prov-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 16px; }
.prov-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.prov-card-name { font-family: var(--mono); font-size: 14px; font-weight: 500; }
.prov-card-total { font-family: var(--mono); font-size: 16px; font-weight: 500; }
.prov-card-stats { font-size: 12px; color: var(--text-muted); display: flex; gap: 12px; }
.prov-detail { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 10px; display: none; }
.prov-detail.open { display: block; }
.pct-bar-bg { height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; }
.pct-bar { height: 4px; background: var(--text); border-radius: 2px; transition: width .4s; }
.filters { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
.filter-btn { padding: 5px 12px; font-size: 12px; border: 1px solid var(--border); border-radius: 20px; background: var(--surface); color: var(--text-muted); cursor: pointer; font-weight: 500; transition: all .15s; }
.filter-btn.active { background: var(--text); color: #f5f4f0; border-color: var(--text); }
.toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--text); color: #f5f4f0; padding: 10px 18px; border-radius: var(--r); font-size: 13px; font-weight: 500; opacity: 0; transform: translateY(8px); transition: all .25s; pointer-events: none; z-index: 999; max-width: min(420px, calc(100vw - 2rem)); word-break: break-word; }
.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { background: #7a1a1a; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: -2px; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading { display: flex; align-items: center; justify-content: center; padding: 3rem; color: var(--text-muted); font-size: 13px; gap: 8px; }
.prov-item { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); }
.prov-item:last-child { border-bottom: none; }
.add-prov-row { display: flex; gap: 8px; margin-bottom: 10px; }
.empty { text-align: center; padding: 2.5rem; color: var(--text-faint); font-size: 13px; }
.amount { font-family: var(--mono); }
.config-warn { background: var(--amber-bg); border: 1px solid #e8c97a; border-radius: var(--r); padding: 12px 16px; font-size: 13px; color: var(--amber-text); margin-bottom: 1rem; }
@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
  .form-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<script>
const APP_VERSION = "1.04";
const GAS_URL = "https://script.google.com/macros/s/AKfycbyWCWw_VPEDuPwrg_ZRYmPNdSbRin6CWN2AOBm7NojB-TZRzDm5ee4emUsU_hLrn4ye/exec";
</script>

<header class="header">
  <span class="header-title">pagos_proveedores</span>
  <div class="header-right">
    <span class="header-version" id="app-version"></span>
    <span class="header-sync" id="sync-status">—</span>
  </div>
</header>

<div class="layout">
  <nav class="sidebar">
    <div class="nav-section">
      <div class="nav-label">Menú</div>
      <div class="nav-item active" onclick="navTo('registrar', this)">
        <span class="nav-icon">＋</span> Registrar
      </div>
      <div class="nav-item" onclick="navTo('totales', this)">
        <span class="nav-icon">≡</span> Totales
      </div>
      <div class="nav-item" onclick="navTo('proveedores', this)">
        <span class="nav-icon">◈</span> Por proveedor
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Config</div>
      <div class="nav-item" onclick="navTo('config', this)">
        <span class="nav-icon">⚙</span> Proveedores
      </div>
    </div>
  </nav>

  <main class="main">

    <div class="page active" id="page-registrar">
      <div class="page-title">Nuevo registro</div>
      <div class="card">
        <div class="card-header"><span class="card-title">Captura de pago / gasto / factura</span></div>
        <div class="card-body">
          <div class="form-grid">
            <div class="form-group">
              <label>Proveedor *</label>
              <select id="f-proveedor"><option value="">Cargando...</option></select>
            </div>
            <div class="form-group">
              <label>Tipo *</label>
              <select id="f-tipo">
                <option value="pago">Pago</option>
                <option value="gasto">Gasto</option>
                <option value="factura">Factura</option>
              </select>
            </div>
            <div class="form-group">
              <label>Monto ($) *</label>
              <input type="number" id="f-monto" placeholder="0.00" min="0" step="0.01">
            </div>
            <div class="form-group">
              <label>Fecha *</label>
              <input type="date" id="f-fecha">
            </div>
            <div class="form-group">
              <label>Número de factura</label>
              <input type="text" id="f-factura" placeholder="Ej: FAC-001">
            </div>
            <div class="form-group">
              <label>Concepto / Referencia</label>
              <input type="text" id="f-concepto" placeholder="Descripción breve">
            </div>
          </div>
          <div class="form-actions">
            <button class="btn" onclick="clearForm()">Limpiar</button>
            <button class="btn btn-primary" id="btn-save" onclick="guardarRegistro()">Guardar registro</button>
          </div>
        </div>
      </div>
    </div>

    <div class="page" id="page-totales">
      <div class="page-title">Totales</div>
      <div class="kpi-row">
        <div class="kpi"><div class="kpi-label">Total general</div><div class="kpi-value" id="k-total">—</div></div>
        <div class="kpi"><div class="kpi-label">Pagos</div><div class="kpi-value" id="k-pagos">—</div></div>
        <div class="kpi"><div class="kpi-label">Gastos</div><div class="kpi-value" id="k-gastos">—</div></div>
        <div class="kpi"><div class="kpi-label">Facturas</div><div class="kpi-value" id="k-facturas">—</div></div>
      </div>
      <div class="card">
        <div class="card-header">
          <span class="card-title">Todos los registros</span>
          <div class="filters" style="margin:0">
            <button class="filter-btn active" onclick="setFilter('', this)">Todos</button>
            <button class="filter-btn" onclick="setFilter('pago', this)">Pagos</button>
            <button class="filter-btn" onclick="setFilter('gasto', this)">Gastos</button>
            <button class="filter-btn" onclick="setFilter('factura', this)">Facturas</button>
          </div>
        </div>
        <div class="card-body" style="padding:0">
          <div id="tabla-total"><div class="loading"><span class="spinner"></span> Cargando...</div></div>
        </div>
      </div>
    </div>

    <div class="page" id="page-proveedores">
      <div class="page-title">Por proveedor</div>
      <div id="prov-cards"><div class="loading"><span class="spinner"></span> Cargando...</div></div>
    </div>

    <div class="page" id="page-config">
      <div class="page-title">Gestionar proveedores</div>
      <div class="card">
        <div class="card-header"><span class="card-title">Lista de proveedores</span></div>
        <div class="card-body">
          <div class="add-prov-row">
            <input type="text" id="new-prov" placeholder="Nombre del proveedor" style="flex:1">
            <button class="btn btn-primary" onclick="agregarProveedor()">Agregar</button>
          </div>
          <div id="prov-manager-list"><div class="loading"><span class="spinner"></span> Cargando...</div></div>
        </div>
      </div>
    </div>

  </main>
</div>

<div class="toast" id="toast"></div>

<script>
let state = { registros: [], proveedores: [], filter: "" };

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('app-version').textContent = 'v' + APP_VERSION;
  document.getElementById('f-fecha').value = new Date().toISOString().split('T')[0];
  loadAll();
});

async function parseJSON(res) {
  const text = await res.text();
  try {
    return JSON.parse(text);
  } catch {
    const snippet = text.replace(/\s+/g, ' ').trim().slice(0, 200);
    throw new Error('Respuesta no JSON: ' + (snippet || '(vacío)'));
  }
}

async function api(action) {
  const res = await fetch(GAS_URL + '?action=' + encodeURIComponent(action));
  return parseJSON(res);
}

async function apiPost(body) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(body)
  });
  return parseJSON(res);
}

async function loadAll() {
  setSyncStatus('Sincronizando...', true);
  try {
    const data = await api('getAll');
    if (data.error) throw new Error(data.error);
    state.registros   = data.registros   || [];
    state.proveedores = data.proveedores || [];
    renderAll();
    setSyncStatus('Sincronizado · ' + fmtTime(new Date()));
  } catch (e) {
    setSyncStatus('Sin conexión');
    toast('Error: ' + e.message, true);
  }
}

function setSyncStatus(msg, loading = false) {
  const el = document.getElementById('sync-status');
  el.innerHTML = loading
    ? '<span class="spinner" style="border-color:#9c9990;border-right-color:transparent"></span>' + msg
    : msg;
}

function navTo(page, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  el.classList.add('active');
  if (page === 'totales')     renderTotales();
  if (page === 'proveedores') renderProveedores();
  if (page === 'config')      renderProvManager();
}

function renderAll() {
  renderProvSelect();
  renderTotales();
  renderProveedores();
  renderProvManager();
}

function renderProvSelect() {
  const s = document.getElementById('f-proveedor');
  s.innerHTML = '<option value="">Seleccionar proveedor...</option>' +
    state.proveedores.map(p => `<option value="${p}">${p}</option>`).join('');
}

function renderTotales() {
  const regs = state.filter ? state.registros.filter(r => r.tipo === state.filter) : state.registros;
  const sum = arr => arr.reduce((a, r) => a + Number(r.monto), 0);
  document.getElementById('k-total').textContent    = fmt(sum(state.registros));
  document.getElementById('k-pagos').textContent    = fmt(sum(state.registros.filter(r => r.tipo === 'pago')));
  document.getElementById('k-gastos').textContent   = fmt(sum(state.registros.filter(r => r.tipo === 'gasto')));
  document.getElementById('k-facturas').textContent = fmt(sum(state.registros.filter(r => r.tipo === 'factura')));
  if (!regs.length) {
    document.getElementById('tabla-total').innerHTML = '<div class="empty">Sin registros</div>';
    return;
  }
  document.getElementById('tabla-total').innerHTML = `
    <div class="table-wrap"><table><thead><tr>
      <th>Fecha</th><th>Proveedor</th><th>Tipo</th><th>Monto</th><th>Factura</th><th>Concepto</th><th></th>
    </tr></thead><tbody>
    ${regs.map(r => `<tr>
      <td>${r.fecha}</td>
      <td style="font-family:var(--mono);font-size:12px">${r.proveedor}</td>
      <td><span class="badge badge-${r.tipo}">${r.tipo}</span></td>
      <td class="amount">${fmt(r.monto)}</td>
      <td style="color:var(--text-muted)">${r.factura || '—'}</td>
      <td style="color:var(--text-muted);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.concepto || '—'}</td>
      <td><button class="btn btn-sm btn-danger" onclick="eliminarRegistro('${r.id}')">✕</button></td>
    </tr>`).join('')}
    </tbody></table></div>`;
}

function setFilter(f, el) {
  state.filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTotales();
}

function renderProveedores() {
  const el = document.getElementById('prov-cards');
  if (!state.proveedores.length) { el.innerHTML = '<div class="empty">Sin proveedores</div>'; return; }
  const totalGlobal = state.registros.reduce((a, r) => a + Number(r.monto), 0);
  el.innerHTML = '<div class="prov-grid">' + state.proveedores.map(p => {
    const regs  = state.registros.filter(r => r.proveedor === p);
    const total = regs.reduce((a, r) => a + Number(r.monto), 0);
    const pct   = totalGlobal ? ((total / totalGlobal) * 100).toFixed(1) : 0;
    return `<div class="prov-card">
      <div class="prov-card-header">
        <div>
          <div class="prov-card-name">${p}</div>
          <div class="prov-card-stats" style="margin-top:3px">
            <span>${regs.length} registros</span>
            <span>${regs.filter(r=>r.tipo==='pago').length} pagos</span>
            <span>${regs.filter(r=>r.tipo==='factura').length} facturas</span>
          </div>
          <div class="pct-bar-bg"><div class="pct-bar" style="width:${pct}%"></div></div>
        </div>
        <div style="text-align:right">
          <div class="prov-card-total">${fmt(total)}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${pct}%</div>
          ${regs.length ? `<button class="btn btn-sm" style="margin-top:6px;font-size:11px" onclick="toggleDetail('${p}')">desglose</button>` : ''}
        </div>
      </div>
      ${regs.length ? `<div class="prov-detail" id="det-${p.replace(/\s/g,'_')}">
        <div class="table-wrap"><table><thead><tr>
          <th>Fecha</th><th>Tipo</th><th>Monto</th><th>Factura</th><th>Concepto</th>
        </tr></thead><tbody>
        ${regs.slice(0,15).map(r=>`<tr>
          <td>${r.fecha}</td>
          <td><span class="badge badge-${r.tipo}">${r.tipo}</span></td>
          <td class="amount">${fmt(r.monto)}</td>
          <td style="color:var(--text-muted)">${r.factura||'—'}</td>
          <td style="color:var(--text-muted)">${r.concepto||'—'}</td>
        </tr>`).join('')}
        </tbody></table></div>
        ${regs.length > 15 ? `<p style="font-size:11px;color:var(--text-faint);padding:8px 0">Mostrando 15 de ${regs.length}</p>` : ''}
      </div>` : ''}
    </div>`;
  }).join('') + '</div>';
}

function toggleDetail(p) {
  const el = document.getElementById('det-' + p.replace(/\s/g,'_'));
  if (el) el.classList.toggle('open');
}

function renderProvManager() {
  const el = document.getElementById('prov-manager-list');
  if (!state.proveedores.length) { el.innerHTML = '<div class="empty">Sin proveedores</div>'; return; }
  el.innerHTML = state.proveedores.map(p => `
    <div class="prov-item">
      <span style="font-family:var(--mono);font-size:13px">${p}</span>
      <button class="btn btn-sm btn-danger" onclick="eliminarProveedor('${p}')">✕ Eliminar</button>
    </div>`).join('');
}

async function guardarRegistro() {
  const prov     = document.getElementById('f-proveedor').value;
  const tipo     = document.getElementById('f-tipo').value;
  const monto    = document.getElementById('f-monto').value;
  const fecha    = document.getElementById('f-fecha').value;
  const factura  = document.getElementById('f-factura').value.trim();
  const concepto = document.getElementById('f-concepto').value.trim();
  if (!prov || !monto || !fecha) { toast('Completa proveedor, monto y fecha', true); return; }
  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Guardando...';
  try {
    const res = await apiPost({ action: 'addRegistro', data: { fecha, proveedor: prov, tipo, monto, factura, concepto } });
    if (res.error) throw new Error(res.error);
    await loadAll();
    clearForm();
    toast('✓ Registro guardado');
  } catch (e) {
    toast('Error: ' + e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Guardar registro';
  }
}

async function eliminarRegistro(id) {
  if (!confirm('¿Eliminar este registro?')) return;
  try {
    const res = await apiPost({ action: 'deleteRegistro', id });
    if (res.error) throw new Error(res.error);
    await loadAll();
    toast('Registro eliminado');
  } catch (e) { toast('Error: ' + e.message, true); }
}

async function agregarProveedor() {
  const nombre = document.getElementById('new-prov').value.trim().toUpperCase();
  if (!nombre) return;
  try {
    const res = await apiPost({ action: 'addProveedor', nombre });
    if (res.error) throw new Error(res.error);
    document.getElementById('new-prov').value = '';
    await loadAll();
    toast('✓ Proveedor agregado');
  } catch (e) { toast('Error: ' + e.message, true); }
}

async function eliminarProveedor(nombre) {
  if (!confirm(`¿Eliminar proveedor "${nombre}"?`)) return;
  try {
    const res = await apiPost({ action: 'deleteProveedor', nombre });
    if (res.error) throw new Error(res.error);
    await loadAll();
    toast('Proveedor eliminado');
  } catch (e) { toast('Error: ' + e.message, true); }
}

function clearForm() {
  document.getElementById('f-proveedor').value = '';
  document.getElementById('f-tipo').value = 'pago';
  document.getElementById('f-monto').value = '';
  document.getElementById('f-factura').value = '';
  document.getElementById('f-concepto').value = '';
}

function fmt(n) {
  return new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(n);
}
function fmtTime(d) {
  return d.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
}
function toast(msg, error = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (error ? ' error' : '');
  setTimeout(() => el.className = 'toast', 3500);
}
</script>
</body>
